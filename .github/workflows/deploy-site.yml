name: Deploy site to Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

# Pages 同一时刻只跑一个部署；不取消进行中的任务，避免生产站点回滚。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 用 GitHub 最新 release 的 tag 重写 site/index.html 里的下载链接。
      # 既处理 URL 里的 /releases/download/<tag>/ 段，也处理文件名里的版本号前缀
      # （electron-builder artifactName: Coase-${version}-<target>-${arch}.${ext}）。
      # 没有 release 时跳过——首次部署、空仓库仍能跑。
      #
      # 注意：用 `gh release list --limit 1` 而不是 `gh release view`。后者映射到
      # GitHub API 的 /releases/latest，**会跳过 prerelease**；而 softprops/action-gh-release
      # 识别 semver alpha/beta/rc 自动打 prerelease 标记，导致 `gh release view` 只能拿到
      # 老的稳定版 tag，sed 就改不到刚发的 alpha 版本。`gh release list` 默认包含 prerelease。
      - name: Rewrite download links to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          LATEST_TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          if [ -z "$LATEST_TAG" ]; then
            echo "No release found on $GITHUB_REPOSITORY, skip rewrite."
            exit 0
          fi
          VERSION=${LATEST_TAG#v}
          echo "Rewriting download links to tag=$LATEST_TAG version=$VERSION"
          sed -E -i \
            -e "s#releases/download/v[^/]+/#releases/download/${LATEST_TAG}/#g" \
            -e "s#/Coase-[^/\"]+-(win|mac|portable)-#/Coase-${VERSION}-\1-#g" \
            site/index.html
          echo "---- post-rewrite hrefs ----"
          grep -oE 'href="https://github\.com/[^"]+"' site/index.html | grep -E '\.(exe|dmg|zip)' || true

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
