name: build-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: pnpm build && pnpm exec electron-builder --win nsis portable --publish never
          - os: macos-latest
            command: pnpm build && pnpm exec electron-builder --mac dmg zip --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 不再用 --all：macOS 任务一次性拉 Windows 二进制时被 GitHub releases
      # 偶发 502 拖死，alpha.44–.47 连续 4 个版本都是这样跪的。每个 OS 只拉
      # 自己要打进包里的那几个 target（见 package.json 的 win/mac.extraResources）。
      - name: Fetch pixi binaries (Windows)
        if: runner.os == 'Windows'
        run: node scripts/fetch-pixi.mjs win32-x64

      - name: Fetch pixi binaries (macOS)
        if: runner.os == 'macOS'
        run: node scripts/fetch-pixi.mjs darwin-x64 darwin-arm64

      # PortableGit (含 git-bash) 仅 Windows 包需要——Claude Agent SDK 在 Windows 上
      # 启动期硬依赖 git-bash，bundle 进安装包让用户机器无需自己装 Git for Windows。
      # 该脚本里 SFX 解压一步只能在 Windows 上跑（PortableGit 是 .7z.exe SFX）。
      - name: Fetch PortableGit (Windows only)
        if: runner.os == 'Windows'
        run: pnpm fetch-portable-git

      - name: Build desktop package
        run: ${{ matrix.command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-packages
          path: release/*
          if-no-files-found: error

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*

  # GITHUB_TOKEN 创建的 release 不会触发其他 workflow 的 release:published 事件，
  # 所以发版后主动触发 deploy-site，让官网下载链接自动重写到最新 tag。
  #
  # 顶层 permissions 只有 contents: write 满足 softprops 上传 release 资产；
  # 这里要 dispatch 另一个 workflow，必须再显式声明 actions: write，
  # 否则 `gh workflow run` 会 403 "Resource not accessible by integration"。
  trigger-site-deploy:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger deploy-site workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-site.yml --repo "$GITHUB_REPOSITORY" --ref main
