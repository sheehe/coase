name: build-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: pnpm build && pnpm exec electron-builder --win nsis portable --publish never
          - os: macos-latest
            command: pnpm build && pnpm exec electron-builder --mac dmg zip --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch pixi binaries
        run: pnpm fetch-pixi:all

      - name: Build desktop package
        run: ${{ matrix.command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-packages
          path: release/*
          if-no-files-found: error

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*

  # GITHUB_TOKEN 创建的 release 不会触发其他 workflow 的 release:published 事件，
  # 所以发版后主动触发 deploy-site，让官网下载链接自动重写到最新 tag。
  trigger-site-deploy:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy-site workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-site.yml --repo "$GITHUB_REPOSITORY" --ref main
